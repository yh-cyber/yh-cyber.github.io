      vx[i]+=(ox[i]-px[i])*CONFIG.elasticity;
      vy[i]+=(oy[i]-py[i])*CONFIG.elasticity;
      vx[i]*=CONFIG.friction; vy[i]*=CONFIG.friction;
      px[i]+=vx[i]; py[i]+=vy[i];
      ctx.fillStyle=colors[i];
      ctx.fillText(chars[i],px[i],py[i]);
    }
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>
