<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yusyra Hossain</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    h2 {
      margin-top: 40px;
      border-bottom: 1px solid #334155;
      padding-bottom: 5px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
    }

    a {
      color: #60a5fa;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Yusyra Hossain</h1>
    <p>CS student at UofT interested in ML</p>

    <h2>Projects</h2>

    <div class="card">
      <strong>Project 1</strong>
      <p>Short description of what you built and what tech you used.</p>
    </div>

    <div class="card">
      <strong>Project 2</strong>
      <p>Another project description.</p>
    </div>

    <h2>Links</h2>
    <p>
      <a href="https://github.com/yh-cyber">GitHub</a> |
      <a href="https://www.linkedin.com/in/yusyrahossain/">LinkedIn</a>
    </p>
  </div>

  <canvas id="asciiCanvas"></canvas>

  <script>
    const canvas = document.getElementById('asciiCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    ctx.font = "8px monospace";
    ctx.textBaseline = "top";

    fetch('vizo-particles.json')
      .then(res => res.json())
      .then(data => {
        data.particles.forEach(p => {
          const x = p.originX * canvas.width;
          const y = p.originY * canvas.height;

          ctx.fillStyle = `rgb(${p.r}, ${p.g}, ${p.b})`;
          ctx.fillText(p.char, x, y);
        });
      });
  </script>
  
</body>
</html>
