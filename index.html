<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yusyra Hossain</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.6;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    h2 {
      margin-top: 40px;
      border-bottom: 1px solid #334155;
      padding-bottom: 5px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
    }

    a {
      color: #60a5fa;
    }

    .ascii-wrapper {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      
      transform-origin: center;
      width: 600px;
      height: 600px;

      overflow: hidden; /* this is what crops it */
    }

    .ascii-wrapper iframe {
      width: 900px;   /* original design size */
      height: 600px;

      border: none;

      transform: scale(0.67); /* 600 / 900 */
      transform-origin: top left;
    }

  </style>
</head>

<body>
  <div class="container">
    <h1>Yusyra Hossain</h1>
    <p>CS student at UofT interested in ML</p>

    <h2>Projects</h2>

    <div class="card">
      <strong>Project 1</strong>
      <p>Short description of what you built and what tech you used.</p>
    </div>

    <div class="card">
      <strong>Project 2</strong>
      <p>Another project description.</p>
    </div>

    <h2>Links</h2>
    <p>
      <a href="https://github.com/yh-cyber">GitHub</a> |
      <a href="https://www.linkedin.com/in/yusyrahossain/">LinkedIn</a>
    </p>
  </div>

  <div class="ascii-wrapper">
    <iframe src="vizo-particles.html"></iframe>
  </div>

</body>
</html>
